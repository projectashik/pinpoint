<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PinPoint Editor — promo tile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff;
    background:
      radial-gradient(120% 140% at 12% 12%, #5b8def 0%, transparent 55%),
      radial-gradient(120% 140% at 90% 95%, #ff3b7b 0%, transparent 55%),
      #20243b;
    display: flex; align-items: center; justify-content: center;
  }
  .wrap { display: flex; align-items: center; gap: 5%; padding: 0 7%; }
  .glyph {
    flex: 0 0 auto;
    aspect-ratio: 1; height: 46cqmin;
    border-radius: 22%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 14px 50px rgba(0,0,0,.28);
  }
  .ring {
    aspect-ratio: 1; height: 58%;
    border-radius: 50%;
    border: 0.16em solid #20243b;
    display: flex; align-items: center; justify-content: center;
  }
  .ring .dot { width: 34%; height: 34%; border-radius: 50%; background: #20243b; }
  .copy { min-width: 0; }
  .name { font-weight: 900; letter-spacing: -0.02em; line-height: 1; }
  .tag { font-weight: 500; color: rgba(255,255,255,.82); margin-top: 0.5em; line-height: 1.3; }
</style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div class="glyph"><div class="ring"><div class="dot"></div></div></div>
    <div class="copy">
      <div class="name" id="name">PinPoint Editor</div>
      <div class="tag" id="tag">Edit any page — and it sticks.</div>
    </div>
  </div>
<script>
  // scale type to the tile size
  function fit() {
    const h = window.innerHeight;
    const glyph = document.querySelector(".glyph");
    glyph.style.height = Math.round(h * 0.5) + "px";
    document.getElementById("name").style.fontSize = Math.round(h * 0.155) + "px";
    document.getElementById("tag").style.fontSize = Math.round(h * 0.075) + "px";
  }
  window.addEventListener("load", fit);
  fit();
</script>
</body>
</html>
